{% extends "base.html" %}
{% load static %}

{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | SmartAgri AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
  --green:#2ecc71;
  --glass:rgba(20,30,24,.8);
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  height:100vh;
  overflow:hidden;
  color:#fff;
}

/* BACKGROUND */
.bg-video{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.bg-overlay{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(12,22,17,.9);
  z-index:-1;
}

/* CARD */
.register-wrapper{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.register-card{
  width:420px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:40px;
  text-align:center;
}

/* INPUT */
.form-control{
  background:rgba(255,255,255,.12);
  border:none;
  color:#ffffff !important;
  padding:12px;
  border-radius:10px;
}

/* 👇 PLACEHOLDER FIX */
.form-control::placeholder{
  color:#dddddd !important;
  opacity:1;
}

.form-control:focus{
  box-shadow:0 0 0 2px rgba(46,204,113,.5);
  background:rgba(255,255,255,.15);
  color:#fff;
}

/* BUTTON */
.register-btn{
  background:#2ecc71;
  border:none;
  border-radius:25px;
  padding:12px;
  width:100%;
  font-weight:600;
  color:#ffffff;   /* 👈 WHITE TEXT */
  transition:.3s;
}

.register-btn:hover{
  background:#27ae60;
  box-shadow:0 0 15px rgba(46,204,113,.6);
}

/* LINK */
.small-link{
  font-size:.9rem;
  margin-top:15px;
}

.small-link a{
  color:#ffffff;   /* 👈 WHITE LINK */
  text-decoration:none;
}

.small-link a:hover{
  color:#2ecc71;
}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
  <source src="{% static 'videos/agriculture_bg.mp4' %}" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<div class="register-wrapper">
  <div class="register-card">

    <h3>Create Farmer Account</h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert bg-danger bg-opacity-25 text-white">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <input type="text" name="username" class="form-control mb-3" placeholder="Enter Username" required>

      <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email" required>

      <input type="password" name="password" class="form-control mb-3" placeholder="Enter Password" required>

      <button class="btn register-btn">Register</button>
    </form>

    <div class="small-link">
      Already have an account?
      <a href="{% url 'login' %}">Login</a>
    </div>

  </div>
</div>

</body>
</html>

{% endblock %}
